# Mango CI
#
# Three parallel jobs (fmt, clippy, test) run on every push to `main` and
# every pull request. A red CI run blocks merge.
#
# Action refs are SHA-pinned per GitHub's third-party-action hardening
# guidance; the human-readable tag is in the trailing comment. The Rust
# toolchain itself floats on `stable` (no MSRV enforcement yet — that's
# a tracked roadmap follow-up).

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded PR runs but never cancel a `main` run mid-flight; if
# two PRs merge back-to-back, both `main` runs must complete so required
# status checks resolve correctly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          # Clippy and test do NOT share a cache scope — clippy doesn't
          # fully codegen, test does, and sharing one `target/` cache
          # silently invalidates work on every alternation.
          prefix-key: v0-clippy
          shared-key: ""
      - name: install protoc
        # tonic-build 0.12 + prost-build 0.13 do not vendor protoc;
        # the protobuf-compiler apt package is on the GitHub runner
        # image cache, so this is warm after the first run.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: cargo fetch
        run: cargo fetch --locked
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          prefix-key: v0-test
          shared-key: ""
      - name: install protoc
        # tonic-build 0.12 + prost-build 0.13 do not vendor protoc.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # cargo-nextest is installed via taiki-e/install-action (SHA-pinned
      # per this repo's convention) and fetches the official release
      # binary from cargo-nextest's GitHub releases with SHA256
      # verification. Same supply-chain posture as EmbarkStudios/
      # cargo-deny-action. See docs/testing.md for the watchdog policy
      # that lives in `.config/nextest.toml`.
      - name: install cargo-nextest
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458  # v2
        with:
          tool: cargo-nextest
      - name: cargo fetch
        run: cargo fetch --locked
      - name: cargo nextest run
        # Per-test-class hard timeouts live in `.config/nextest.toml`.
        # `--profile ci` inherits from [profile.default], so the class
        # overrides (unit=30s, integration=5m, loom=30m, chaos=24h)
        # apply here too. fail-fast is disabled in the profile — a
        # failing test does not short-circuit the run.
        run: cargo nextest run --workspace --all-targets --locked --profile ci
      - name: cargo test --doc
        # nextest does NOT run doctests; this step covers them.
        # Placed after nextest so the workspace dep cache is warm and
        # only doctest-specific artifacts recompile.
        run: cargo test --doc --workspace --locked
      - name: watchdog smoke (assert nextest kills runaway tests)
        # Proves `slow-timeout = { ..., terminate-after = 1 }` actually
        # kills. Without this, someone could silently drop
        # terminate-after from nextest.toml and the watchdog would
        # downgrade to warn-only without CI noticing.
        run: bash scripts/test-watchdog.sh

  msrv:
    # MSRV enforcement. `cargo check` on the pinned 1.89 toolchain
    # proves the workspace compiles on MSRV; the drift-detection
    # script proves the pin here and the rust-version in Cargo.toml
    # agree. Decouples the declaration (manifest) from the gate
    # (this job), then ties them back together with the script.
    name: msrv (cargo check @ 1.89)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      # `toolchain: "1.89"` is rustup's shorthand — it resolves to
      # whatever 1.89.z rustup's manifest has at install time. That's
      # the right amount of pinning for MSRV enforcement: "minimum
      # 1.89-family," not an exact patch.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable (action)
        with:
          toolchain: "1.89"
      - name: verify workflow MSRV matches Cargo.toml
        # scripts/test-msrv-pin.sh is the single source of the drift
        # check — committed, runnable locally, and invoked here.
        run: bash scripts/test-msrv-pin.sh
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          # Pinned MSRV in the cache key so a future MSRV bump
          # invalidates this job's cache cleanly without a manual rev.
          prefix-key: v0-msrv-1.89
          shared-key: ""
      - name: install protoc
        # tonic-build 0.12 + prost-build 0.13 do not vendor protoc.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # The `--target x86_64-unknown-linux-gnu` workaround (Issue #23)
      # was retired at the 1.80 → 1.89 MSRV bump (ADR 0003) because
      # cargo ≥ 1.85 parses `edition = "2024"` manifests natively. The
      # wasi-only `wit-bindgen 0.57.1` transitive that triggered the
      # workaround no longer breaks `cargo fetch --locked` on the MSRV
      # toolchain.
      - name: cargo fetch
        run: cargo fetch --locked
      - name: cargo check (workspace, all targets, MSRV toolchain)
        # `cargo check`, not build/test: MSRV cares about compilation
        # feasibility, not artifact production or runtime semantics.
        # `--all-targets` includes tests/benches/examples so the full
        # source tree is typechecked on MSRV, matching the practice in
        # tokio / serde / hyper / reqwest.
        run: cargo check --workspace --all-targets --locked

  deny:
    # Supply-chain policy gate: licenses, RustSec advisories, banned
    # crates (openssl-*, native-tls), duplicate versions, git-deps.
    # Policy lives in `deny.toml` at the repo root.
    #
    # The action downloads a pinned `cargo-deny` binary — no Rust
    # toolchain needed. SHA-pinned per the same convention as the
    # other jobs; Embark Studios owns both the action and the tool,
    # so the pin tracks v2.0.17 (April 2026).
    name: deny
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb  # v2.0.17
        with:
          command: check
          arguments: --all-features

  doc:
    # Rustdoc gate. Two layers, one job:
    #
    #   1. RUSTDOCFLAGS="-D warnings" — every rustdoc lint becomes
    #      a hard error. Catches rustdoc::broken_intra_doc_links
    #      (the common regression after a rename), invalid HTML,
    #      bare URLs, etc. We do NOT enumerate a specific lint
    #      allowlist — new rustdoc lints land every few releases,
    #      and an allowlist rots silently. Broad deny plus per-
    #      module `#![allow(...)]` for known-noisy generated code
    #      (crates/mango-proto/src/lib.rs for prost output) is the
    #      correct shape.
    #
    #   2. `#![deny(missing_docs)]` on every crates/mango-*/src/lib.rs
    #      root — source-side contract that every `pub` item has at
    #      least one line of prose. The attribute survives CI-flag
    #      rearrangement; -D warnings alone would silently drop
    #      missing_docs enforcement if someone pulled the flag.
    #
    # Doctest *execution* stays in the `test` job below (it runs
    # `cargo test --doc`). This job is link/warn-only — compiles
    # doc pages but does not execute code blocks. See
    # docs/documentation-policy.md for the full policy.
    #
    # Why a job in ci.yml and not a dedicated doc.yml: cargo doc
    # is stable-toolchain + protoc (already warm from the clippy
    # job's cache) + a few seconds of compile. Dedicated file
    # would split the "core compile/lint/doc" cluster for no win.
    name: doc
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          # Distinct cache scope — cargo doc's artifacts are not
          # interchangeable with clippy/test/msrv. Sharing would
          # silently invalidate other jobs on every alternation.
          prefix-key: v0-doc
          shared-key: ""
      - name: install protoc
        # tonic-build 0.12 + prost-build 0.13 do not vendor protoc;
        # mango-proto's build script needs it. protoc ships on the
        # GitHub-hosted runner image — same convention as the
        # clippy/test/msrv jobs.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: cargo fetch
        # Strictly redundant with cargo doc's own fetch, but mirrors
        # the clippy/test/msrv step shape and gives a clean log
        # boundary if the network flakes on the lockfile resolve.
        run: cargo fetch --locked
      - name: cargo doc (gate)
        env:
          # `-D warnings` turns rustdoc lints into errors. See
          # docs/documentation-policy.md for the rationale and the
          # local reproducer command.
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --document-private-items --workspace --locked

  bench-harness:
    # Bench-harness scaffold smoke tests. No Rust toolchain, no cache —
    # the scaffold is pure shell (etcd oracle fetch-and-verify, hardware
    # signature emission, runner wrapper). See benches/README.md and
    # .planning/adr/0001-bench-oracle-harness.md for the rationale.
    #
    # Advisory until main branch protection is enabled with this job
    # in the required-checks list (tracked as a follow-up).
    name: bench-harness
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: oracle fetch tests (VERSIONS coverage, verify_sha)
        run: bash scripts/test-bench-oracle-fetch.sh
      - name: hardware-signature tests (format, determinism, tier, round-trip)
        run: bash scripts/test-hardware-signature.sh
      - name: run.sh wrapper tests (stdout clean, sidecar, tier enforcement)
        run: bash scripts/test-bench-run-wrapper.sh
      - name: VERSIONS immutability
        # Belt-and-suspenders: no test above should mutate the committed
        # pin file. If one does, this diff catches it before merge.
        run: git diff --exit-code benches/oracles/etcd/VERSIONS
