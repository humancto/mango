# Mango CI
#
# Three parallel jobs (fmt, clippy, test) run on every push to `main` and
# every pull request. A red CI run blocks merge.
#
# Action refs are SHA-pinned per GitHub's third-party-action hardening
# guidance; the human-readable tag is in the trailing comment. The Rust
# toolchain itself floats on `stable` (no MSRV enforcement yet — that's
# a tracked roadmap follow-up).

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded PR runs but never cancel a `main` run mid-flight; if
# two PRs merge back-to-back, both `main` runs must complete so required
# status checks resolve correctly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          # Clippy and test do NOT share a cache scope — clippy doesn't
          # fully codegen, test does, and sharing one `target/` cache
          # silently invalidates work on every alternation.
          prefix-key: v0-clippy
          shared-key: ""
      - name: cargo fetch
        run: cargo fetch --locked
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          prefix-key: v0-test
          shared-key: ""
      - name: cargo fetch
        run: cargo fetch --locked
      - name: cargo test
        # `--no-fail-fast` here means "report all failing test binaries
        # in one CI run" — it is unrelated to the matrix-strategy
        # `fail-fast: false` knob, which doesn't apply (no matrix yet).
        run: cargo test --workspace --all-targets --locked --no-fail-fast

  msrv:
    # MSRV enforcement. `cargo check` on the pinned 1.80 toolchain
    # proves the workspace compiles on MSRV; the drift-detection
    # script proves the pin here and the rust-version in Cargo.toml
    # agree. Decouples the declaration (manifest) from the gate
    # (this job), then ties them back together with the script.
    name: msrv (cargo check @ 1.80)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      # `toolchain: "1.80"` is rustup's shorthand — it resolves to
      # whatever 1.80.z rustup's manifest has at install time
      # (currently 1.80.1). That's the right amount of pinning for
      # MSRV enforcement: "minimum 1.80-family," not an exact patch.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable (action)
        with:
          toolchain: "1.80"
      - name: verify workflow MSRV matches Cargo.toml
        # scripts/test-msrv-pin.sh is the single source of the drift
        # check — committed, runnable locally, and invoked here.
        run: bash scripts/test-msrv-pin.sh
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          # Pinned MSRV in the cache key so a future MSRV bump
          # invalidates this job's cache cleanly without a manual rev.
          prefix-key: v0-msrv-1.80
          shared-key: ""
      - name: cargo fetch
        run: cargo fetch --locked
      - name: cargo check (workspace, all targets, MSRV toolchain)
        # `cargo check`, not build/test: MSRV cares about compilation
        # feasibility, not artifact production or runtime semantics.
        # `--all-targets` includes tests/benches/examples so the full
        # source tree is typechecked on MSRV, matching the practice in
        # tokio / serde / hyper / reqwest.
        run: cargo check --workspace --all-targets --locked

  deny:
    # Supply-chain policy gate: licenses, RustSec advisories, banned
    # crates (openssl-*, native-tls), duplicate versions, git-deps.
    # Policy lives in `deny.toml` at the repo root.
    #
    # The action downloads a pinned `cargo-deny` binary — no Rust
    # toolchain needed. SHA-pinned per the same convention as the
    # other jobs; Embark Studios owns both the action and the tool,
    # so the pin tracks v2.0.17 (April 2026).
    name: deny
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb  # v2.0.17
        with:
          command: check
          arguments: --all-features
