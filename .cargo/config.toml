# Workspace-wide Cargo configuration.
#
# `incompatible-rust-versions = "fallback"` enables the MSRV-aware resolver
# (stable since Cargo 1.84). When resolving dependencies, Cargo prefers the
# latest version whose declared `rust-version` is compatible with the
# workspace's MSRV (`rust-version = "1.89"` in the workspace manifest — see
# ADR 0003), silently picking older compatible releases instead of the newest
# published release. Without this, `cargo update` can pin transitive deps
# that require a newer Rust than the workspace floor, breaking the
# `cargo check @ 1.89` MSRV gate.
#
# At MSRV 1.89 the Cargo driving the MSRV CI job (>= 1.89) natively honours
# this setting, so the fallback applies both at lockfile-generation time
# *and* at the MSRV-check invocation. Contributors regenerating the lockfile
# on any supported MSRV toolchain get the fallback for free; a too-new
# lockfile (generated by a newer Cargo whose deps require rustc > 1.89)
# still trips the MSRV job at PR time.
[resolver]
incompatible-rust-versions = "fallback"
